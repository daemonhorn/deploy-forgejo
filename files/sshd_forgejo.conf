# Dedicated sshd instance for Forgejo Git-over-SSH access (port 2222).
# Runs as a separate systemd service alongside the main sshd (port 22).
Port 2222
ListenAddress 0.0.0.0

# Reuse the host's ECDSA host key so clients don't get key-changed warnings.
HostKey /etc/ssh/ssh_host_ecdsa_key
HostKey /etc/ssh/ssh_host_ed25519_key

# Only the git system user may connect on this sshd instance.
AllowUsers git

# All auth (raw keys and certificates) goes through AuthorizedKeysCommand.
# TrustedUserCAKeys is intentionally absent: if set, sshd validates the cert
# directly and skips AuthorizedKeysCommand, so the command="forgejo serv key-N"
# restriction from Forgejo is never applied and git operations break.
# Instead, forgejo-keys.sh returns a cert-authority,command=... line so sshd
# validates the CA signature AND enforces the per-key command= in one step.
PubkeyAuthentication yes
AuthorizedKeysFile none

# Delegate key/cert lookup to Forgejo via Docker.
# For cert auth: extracts base key from cert blob, queries Forgejo, returns a
# cert-authority line with command= so CA validation and serv dispatch both apply.
# For raw key auth: queries Forgejo directly and returns the command= line.
AuthorizedKeysCommand /usr/local/bin/forgejo-keys.sh %u %t %k
AuthorizedKeysCommandUser nobody

# Disable PAM: the git system user is a locked account (useradd -r sets password
# to '!'). With UsePAM yes, PAM blocks SSH key auth for locked accounts. Auth
# here is entirely via AuthorizedKeysCommand — PAM is not needed.
UsePAM no

# Harden: no password, no root, no X11.
PasswordAuthentication no
PermitRootLogin no
X11Forwarding no
AllowAgentForwarding no
AllowTcpForwarding no
PermitTTY no

# Each session is a Forgejo serv command; no interactive shell needed.
# The command= wrapper in AuthorizedKeysCommand output from Forgejo handles this.
PidFile /run/sshd-forgejo.pid

# Diagnostic: uncomment to enable verbose sshd logging (shows cert validation,
# AuthorizedKeysCommand invocation, and key-match results). Disable after
# troubleshooting to avoid filling the journal with per-connection detail.
#LogLevel VERBOSE
